    <script>
      function feelingUninspired() {
        const images = document.querySelectorAll('.image-container img');
        if (images.length === 0) return;
        
        // Remove previous highlights
        images.forEach(img => img.classList.remove('highlighted'));
        
        // Pick random image
        const randomImg = images[Math.floor(Math.random() * images.length)];
        
        // Scroll to it
        randomImg.scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        // Add flashing neon highlight class
        randomImg.classList.add('highlighted');
        
        // Remove highlight after 2.5 seconds
        setTimeout(() => {
          randomImg.classList.remove('highlighted');
        }, 2500);
      }

      document.addEventListener("DOMContentLoaded", () => {
        const gallery = document.querySelector('.gallery');
        if (!gallery) return;
        
        const images = gallery.querySelectorAll('img');
        
        // Update photo count in footer
        const countSpan = document.getElementById('photo-count');
        if (countSpan) {
          countSpan.textContent = images.length;
        }
        
        images.forEach(img => {
          // Create wrapper container
          const wrapper = document.createElement('div');
          wrapper.className = 'image-container';
          
          // Insert wrapper before the image
          img.parentNode.insertBefore(wrapper, img);
          
          // Append image to wrapper
          wrapper.appendChild(img);
          
          // Read alt text to create retro tooltip caption
          let altText = img.getAttribute('alt');
          if (!altText || altText.trim() === '') {
            const fallbacks = [
              "Terribly beautiful",
              "Out of focus masterpiece",
              "Yes it is a photo",
              "So bad it's good",
              "Unclear but also so clearly bagood"
            ];
            altText = fallbacks[Math.floor(Math.random() * fallbacks.length)];
          }
          
          const tooltip = document.createElement('div');
          tooltip.className = 'tooltip';
          tooltip.textContent = `Caption: ${altText}`;
          wrapper.appendChild(tooltip);
          
          // Toggle tooltip on mobile click/tap
          wrapper.addEventListener('click', (e) => {
            if (window.matchMedia("(max-width: 768px)").matches) {
              const clickedInside = e.target === img || e.target === wrapper;
              if (clickedInside) {
                e.preventDefault();
                // Toggle current, remove others
                document.querySelectorAll('.image-container').forEach(c => {
                  if (c !== wrapper) c.classList.remove('show-tooltip');
                });
                wrapper.classList.toggle('show-tooltip');
              }
            }
          });
        });
        
        // Hide tooltips if clicking elsewhere on mobile
        document.addEventListener('click', (e) => {
          if (window.matchMedia("(max-width: 768px)").matches) {
            if (!e.target.closest('.image-container')) {
              document.querySelectorAll('.image-container').forEach(c => {
                c.classList.remove('show-tooltip');
              });
            }
          }
        });
      });
    </script>
